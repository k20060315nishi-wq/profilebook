<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Profile Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            perspective: 2000px;
        }

        #book-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* ズーム・移動用 */
        }

        .page-container {
            position: relative;
            max-width: 95%;
            max-height: 85%;
            display: flex;
            transform-style: preserve-3d;
            pointer-events: auto;
        }

        .page-img {
            height: auto;
            max-height: 85vh;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            background-color: #fff;
            backface-visibility: hidden;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 紙をめくるアニメーション */
        .page-flip-next {
            animation: flipNextPage 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        .page-flip-prev {
            animation: flipPrevPage 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        @keyframes flipNextPage {
            0% { transform: rotateY(0deg); transform-origin: left; }
            100% { transform: rotateY(-180deg); transform-origin: left; opacity: 0; }
        }

        @keyframes flipPrevPage {
            0% { transform: rotateY(0deg); transform-origin: right; }
            100% { transform: rotateY(180deg); transform-origin: right; opacity: 0; }
        }

        .fade-in {
            animation: fadeInPage 0.8s ease-out forwards;
        }
        @keyframes fadeInPage {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ズーム中はタッチゾーンを無効化（誤作動防止） */
        .touch-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 25%;
            z-index: 100;
        }
        #prev-zone { left: 0; }
        #next-zone { right: 0; }

        #page-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 24px;
            border-radius: 999px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .img-error {
            border: 1px solid #333;
            position: relative;
            min-width: 200px;
            min-height: 300px;
            background: #222;
        }
        .img-error::after {
            content: 'Image not found';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 12px;
        }

        /* 拡大中のヒント */
        #zoom-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div id="prev-zone" class="touch-zone"></div>
        <div id="next-zone" class="touch-zone"></div>
        
        <div id="book-wrapper">
            <div class="page-container" id="page-display-container">
                <img id="img-left" class="page-img" src="" alt="Page Left" onerror="this.classList.add('img-error')">
                <img id="img-right" class="page-img" src="" alt="Page Right" onerror="this.classList.add('img-error')">
            </div>
        </div>
    </div>

    <div id="page-overlay">
        <span id="page-label">1</span> / <span id="total-pages">--</span>
    </div>

    <div id="zoom-hint">Double tap to Zoom</div>

    <script>
        const TOTAL_PAGES = 18; 
        const IMAGE_PREFIX = 'page'; 
        const IMAGE_EXT = '.png';

        let currentPage = 1;
        let isSpread = false;
        let isAnimating = false;

        // ズーム関連の変数
        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let lastTouchDistance = 0;

        const wrapper = document.getElementById('book-wrapper');
        const container = document.getElementById('page-display-container');
        const imgLeft = document.getElementById('img-left');
        const imgRight = document.getElementById('img-right');
        const pageLabel = document.getElementById('page-label');
        const totalLabel = document.getElementById('total-pages');

        totalLabel.textContent = TOTAL_PAGES;

        function updateDisplay() {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            isSpread = screenWidth > screenHeight;

            if (isSpread && currentPage > 1 && currentPage % 2 !== 0) {
                currentPage--;
            }

            imgLeft.classList.remove('img-error');
            imgRight.classList.remove('img-error');

            if (isSpread && currentPage < TOTAL_PAGES && currentPage !== 1) {
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.src = `${IMAGE_PREFIX}${currentPage + 1}${IMAGE_EXT}`;
                imgRight.style.display = 'block';
                pageLabel.textContent = `${currentPage}-${currentPage + 1}`;
            } else {
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.style.display = 'none';
                pageLabel.textContent = currentPage;
            }
            // ページ変更時にズームをリセット
            resetZoom();
        }

        function resetZoom() {
            scale = 1;
            pointX = 0;
            pointY = 0;
            updateTransform();
        }

        function updateTransform() {
            wrapper.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
            // ズーム中はページめくりゾーンを反応しにくくする
            const zones = document.querySelectorAll('.touch-zone');
            zones.forEach(z => z.style.pointerEvents = scale > 1.1 ? 'none' : 'auto');
        }

        function navigate(direction) {
            if (isAnimating || scale > 1.1) return; // 拡大中はめくりを無効化

            let nextNum = currentPage;
            const step = isSpread && currentPage > 1 ? 2 : 1;

            if (direction === 'next') {
                if (currentPage >= TOTAL_PAGES) return;
                nextNum = currentPage + (currentPage === 1 ? 1 : step);
                if (nextNum > TOTAL_PAGES) nextNum = TOTAL_PAGES;
                container.classList.add('page-flip-next');
            } else {
                if (currentPage <= 1) return;
                nextNum = Math.max(1, currentPage - (currentPage <= 2 ? 1 : step));
                container.classList.add('page-flip-prev');
            }

            isAnimating = true;
            
            setTimeout(() => {
                currentPage = nextNum;
                updateDisplay();
                container.classList.remove('page-flip-next', 'page-flip-prev');
                container.classList.add('fade-in');
            }, 400);

            setTimeout(() => {
                container.classList.remove('fade-in');
                isAnimating = false;
            }, 800);
        }

        // --- ズーム & ドラッグ ロジック ---

        document.getElementById('viewer-container').addEventListener('mousedown', (e) => {
            if (scale > 1) {
                isDragging = true;
                startX = e.clientX - pointX;
                startY = e.clientY - pointY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // タッチ操作（ピンチ & ドラッグ）
        document.getElementById('viewer-container').addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                lastTouchDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            } else if (e.touches.length === 1 && scale > 1) {
                isDragging = true;
                startX = e.touches[0].clientX - pointX;
                startY = e.touches[0].clientY - pointY;
            }
        }, {passive: false});

        document.getElementById('viewer-container').addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const delta = dist / lastTouchDistance;
                scale = Math.min(Math.max(1, scale * delta), 4);
                lastTouchDistance = dist;
                updateTransform();
            } else if (e.touches.length === 1 && isDragging) {
                pointX = e.touches[0].clientX - startX;
                pointY = e.touches[0].clientY - startY;
                updateTransform();
            }
        }, {passive: false});

        document.getElementById('viewer-container').addEventListener('touchend', () => {
            isDragging = false;
        });

        // ダブルタップでズーム
        let lastTap = 0;
        document.getElementById('viewer-container').addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                if (scale > 1.1) {
                    resetZoom();
                } else {
                    scale = 2.5;
                    // タップした位置を中心に持ってくる（簡易）
                    pointX = (window.innerWidth / 2 - e.clientX) * 1.5;
                    pointY = (window.innerHeight / 2 - e.clientY) * 1.5;
                    updateTransform();
                }
                e.preventDefault();
            }
            lastTap = now;
        });

        // マウスホイールでズーム
        document.getElementById('viewer-container').addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.min(Math.max(1, scale * delta), 4);
            updateTransform();
        }, {passive: false});

        // --- ページめくりゾーン ---
        document.getElementById('prev-zone').addEventListener('click', () => {
            if (scale <= 1.1) navigate('prev');
        });
        document.getElementById('next-zone').addEventListener('click', () => {
            if (scale <= 1.1) navigate('next');
        });

        window.addEventListener('resize', updateDisplay);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate('prev');
            if (e.key === 'ArrowRight') navigate('next');
            if (e.key === 'Escape') resetZoom();
        });

        updateDisplay();
    </script>
</body>
</html>
