<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Profile Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a; /* 背景を少し暗くして高級感を */
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            perspective: 2000px; /* 3D効果を強める */
        }

        #book-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .page-container {
            position: relative;
            max-width: 95%;
            max-height: 85%;
            display: flex;
            transform-style: preserve-3d;
        }

        .page-img {
            height: auto;
            max-height: 85vh;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            background-color: #fff;
            backface-visibility: hidden;
        }

        /* 紙をめくるアニメーション */
        .page-flip-next {
            animation: flipNextPage 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        .page-flip-prev {
            animation: flipPrevPage 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        @keyframes flipNextPage {
            0% { transform: rotateY(0deg); transform-origin: left; }
            100% { transform: rotateY(-180deg); transform-origin: left; opacity: 0; }
        }

        @keyframes flipPrevPage {
            0% { transform: rotateY(0deg); transform-origin: right; }
            100% { transform: rotateY(180deg); transform-origin: right; opacity: 0; }
        }

        /* めくる瞬間のフェードイン用 */
        .fade-in {
            animation: fadeInPage 0.8s ease-out forwards;
        }
        @keyframes fadeInPage {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .touch-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35%;
            z-index: 100;
        }
        #prev-zone { left: 0; }
        #next-zone { right: 0; }

        #page-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 24px;
            border-radius: 999px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 画像が読み込めないときのエラー表示 */
        .img-error {
            border: 1px solid #333;
            position: relative;
            min-width: 200px;
            min-height: 300px;
            background: #222;
        }
        .img-error::after {
            content: 'Image not found';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div id="prev-zone" class="touch-zone"></div>
        <div id="next-zone" class="touch-zone"></div>
        
        <div id="book-wrapper">
            <div class="page-container" id="page-display-container">
                <img id="img-left" class="page-img" src="" alt="Page Left" onerror="this.classList.add('img-error')">
                <img id="img-right" class="page-img" src="" alt="Page Right" onerror="this.classList.add('img-error')">
            </div>
        </div>
    </div>

    <div id="page-overlay">
        <span id="page-label">1</span> / <span id="total-pages">--</span>
    </div>

    <script>
        /**
         * 設定項目
         */
        const TOTAL_PAGES = 18; 
        const IMAGE_PREFIX = 'page'; // page1.png, page2.png...
        const IMAGE_EXT = '.png';

        let currentPage = 1;
        let isSpread = false;
        let isAnimating = false;

        const wrapper = document.getElementById('book-wrapper');
        const container = document.getElementById('page-display-container');
        const imgLeft = document.getElementById('img-left');
        const imgRight = document.getElementById('img-right');
        const pageLabel = document.getElementById('page-label');
        const totalLabel = document.getElementById('total-pages');

        totalLabel.textContent = TOTAL_PAGES;

        function updateDisplay() {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            isSpread = screenWidth > screenHeight;

            // ページ番号の正規化 (見開き時は偶数スタートに調整)
            if (isSpread && currentPage > 1 && currentPage % 2 !== 0) {
                currentPage--;
            }

            imgLeft.classList.remove('img-error');
            imgRight.classList.remove('img-error');

            if (isSpread && currentPage < TOTAL_PAGES && currentPage !== 1) {
                // 見開きモード
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.src = `${IMAGE_PREFIX}${currentPage + 1}${IMAGE_EXT}`;
                imgRight.style.display = 'block';
                pageLabel.textContent = `${currentPage}-${currentPage + 1}`;
            } else {
                // 1ページモード
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.style.display = 'none';
                pageLabel.textContent = currentPage;
            }
        }

        function navigate(direction) {
            if (isAnimating) return;

            let nextNum = currentPage;
            const step = isSpread && currentPage > 1 ? 2 : 1;

            if (direction === 'next') {
                if (currentPage >= TOTAL_PAGES) return;
                nextNum = currentPage + (currentPage === 1 ? 1 : step);
                if (nextNum > TOTAL_PAGES) nextNum = TOTAL_PAGES;
                
                container.classList.add('page-flip-next');
            } else {
                if (currentPage <= 1) return;
                nextNum = Math.max(1, currentPage - (currentPage <= 2 ? 1 : step));
                
                container.classList.add('page-flip-prev');
            }

            isAnimating = true;
            
            // アニメーションが半分進んだところで背景側の画像を差し替え、新しいページをフェードインさせる準備
            setTimeout(() => {
                currentPage = nextNum;
                updateDisplay();
                container.classList.remove('page-flip-next', 'page-flip-prev');
                container.classList.add('fade-in');
            }, 400);

            setTimeout(() => {
                container.classList.remove('fade-in');
                isAnimating = false;
            }, 800);
        }

        document.getElementById('prev-zone').addEventListener('click', () => navigate('prev'));
        document.getElementById('next-zone').addEventListener('click', () => navigate('next'));

        window.addEventListener('resize', updateDisplay);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate('prev');
            if (e.key === 'ArrowRight') navigate('next');
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) navigate('next');
            if (touchEndX - touchStartX > 50) navigate('prev');
        }, {passive: true});

        // 初期実行
        updateDisplay();
    </script>
</body>
</html>
