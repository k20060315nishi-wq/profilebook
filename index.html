<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Profile Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        #pdf-canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .touch-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30%;
            z-index: 50;
        }
        #prev-zone { left: 0; }
        #next-zone { right: 0; }

        #page-overlay {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            padding: 8px 20px;
            border-radius: 999px;
            font-family: 'serif';
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: none;
            transition: opacity 1s ease;
            opacity: 0;
            backdrop-filter: blur(4px);
        }

        #page-overlay.show {
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #fdfbf7;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error-ui {
            display: none;
            color: #ef4444;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div id="prev-zone" class="touch-zone"></div>
        <div id="next-zone" class="touch-zone"></div>
        <canvas id="pdf-canvas"></canvas>
    </div>

    <div id="page-overlay">
        <span id="page-num">0</span> / <span id="total-pages">0</span>
    </div>

    <div id="loading" class="loading-overlay">
        <div id="loading-content">
            <div class="spinner mb-4 mx-auto"></div>
            <div class="text-stone-500 font-serif italic">Loading...</div>
        </div>
        <div id="error-ui">
            <p class="font-bold mb-2">PDFを読み込めませんでした</p>
            <p class="text-xs text-stone-500">book.pdfがGitHubの正しい場所に保存されているか確認してください。</p>
        </div>
    </div>

    <script>
        // Web Workerの設定
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const PDF_PATH = './book.pdf';

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let overlayTimeout = null;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const pageOverlay = document.getElementById('page-overlay');

        function showPageOverlay() {
            pageOverlay.classList.add('show');
            if (overlayTimeout) clearTimeout(overlayTimeout);
            overlayTimeout = setTimeout(() => {
                pageOverlay.classList.remove('show');
            }, 2500);
        }

        async function renderPage(num) {
            if (!pdfDoc) return;
            pageRendering = true;
            
            try {
                const page = await pdfDoc.getPage(num);
                const viewportOrig = page.getViewport({ scale: 1 });
                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;
                
                const scale = Math.min(screenWidth / viewportOrig.width, screenHeight / viewportOrig.height) * (window.devicePixelRatio || 1);
                const viewport = page.getViewport({ scale });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
            } catch (err) {
                console.error('Render error:', err);
            }
            
            pageRendering = false;
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }

            document.getElementById('page-num').textContent = num;
            showPageOverlay();
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function onPrevPage() {
            if (!pdfDoc || pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function onNextPage() {
            if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        // 初期化処理
        window.addEventListener('load', async () => {
            try {
                // getDocumentの引数をオブジェクト形式に修正
                const loadingTask = pdfjsLib.getDocument({
                    url: PDF_PATH,
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
                    cMapPacked: true,
                });

                pdfDoc = await loadingTask.promise;
                document.getElementById('total-pages').textContent = pdfDoc.numPages;
                
                await renderPage(pageNum);
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error('PDF読み込み失敗:', err);
                document.getElementById('loading-content').style.display = 'none';
                document.getElementById('error-ui').style.display = 'block';
            }
        });

        document.getElementById('prev-zone').addEventListener('click', onPrevPage);
        document.getElementById('next-zone').addEventListener('click', onNextPage);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') onPrevPage();
            if (e.key === 'ArrowRight') onNextPage();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) onNextPage();
            if (touchEndX - touchStartX > 50) onPrevPage();
        }, {passive: true});

        window.addEventListener('resize', () => {
            if (pdfDoc) queueRenderPage(pageNum);
        });

    </script>
</body>
</html>
