<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Profile Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            perspective: 1500px;
        }

        #book-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .page-container {
            max-width: 95%;
            max-height: 90%;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            display: flex;
            background: #111;
        }

        .page-img {
            height: auto;
            max-height: 90vh;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
            background-color: #111;
        }

        /* アニメーション */
        .flip-next { animation: flipNext 0.6s ease-in-out; }
        .flip-prev { animation: flipPrev 0.6s ease-in-out; }

        @keyframes flipNext {
            0% { transform: translateX(0) rotateY(0); opacity: 1; }
            45% { transform: translateX(-30%) rotateY(-20deg); opacity: 0.7; }
            55% { transform: translateX(30%) rotateY(20deg); opacity: 0.7; }
            100% { transform: translateX(0) rotateY(0); opacity: 1; }
        }

        @keyframes flipPrev {
            0% { transform: translateX(0) rotateY(0); opacity: 1; }
            45% { transform: translateX(30%) rotateY(20deg); opacity: 0.7; }
            55% { transform: translateX(-30%) rotateY(-20deg); opacity: 0.7; }
            100% { transform: translateX(0) rotateY(0); opacity: 1; }
        }

        .touch-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35%;
            z-index: 100;
        }
        #prev-zone { left: 0; }
        #next-zone { right: 0; }

        #page-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 6px 20px;
            border-radius: 999px;
            font-family: 'serif';
            font-size: 13px;
            letter-spacing: 0.1em;
            pointer-events: none;
            backdrop-filter: blur(8px);
        }

        /* 画像が読み込めないときのエラー表示 */
        .img-error {
            border: 1px solid #333;
            position: relative;
            min-width: 200px;
            min-height: 300px;
        }
        .img-error::after {
            content: 'Image not found';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div id="prev-zone" class="touch-zone"></div>
        <div id="next-zone" class="touch-zone"></div>
        
        <div id="book-wrapper">
            <div class="page-container" id="page-display-container">
                <img id="img-left" class="page-img" src="" alt="Page Left" onerror="this.classList.add('img-error')">
                <img id="img-right" class="page-img" src="" alt="Page Right" onerror="this.classList.add('img-error')">
            </div>
        </div>
    </div>

    <div id="page-overlay">
        <span id="page-label">1</span> / <span id="total-pages">--</span>
    </div>

    <script>
        /**
         * 設定項目
         */
        const TOTAL_PAGES = 18; 
        const IMAGE_PREFIX = 'page'; // page1.png, page2.png...
        const IMAGE_EXT = '.png';    // .jpgから.pngに変更しました

        let currentPage = 1;
        let isSpread = false;
        let isAnimating = false;

        const wrapper = document.getElementById('book-wrapper');
        const imgLeft = document.getElementById('img-left');
        const imgRight = document.getElementById('img-right');
        const pageLabel = document.getElementById('page-label');
        const totalLabel = document.getElementById('total-pages');

        totalLabel.textContent = TOTAL_PAGES;

        function updateDisplay() {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            isSpread = screenWidth > screenHeight;

            // ページ番号の正規化
            if (isSpread && currentPage > 1 && currentPage % 2 !== 0) {
                currentPage--;
            }

            // エラークラスをリセット
            imgLeft.classList.remove('img-error');
            imgRight.classList.remove('img-error');

            if (isSpread && currentPage < TOTAL_PAGES && currentPage !== 1) {
                // 見開きモード (2ページ目以降)
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.src = `${IMAGE_PREFIX}${currentPage + 1}${IMAGE_EXT}`;
                imgRight.style.display = 'block';
                pageLabel.textContent = `${currentPage}-${currentPage + 1}`;
            } else {
                // 1ページモード (表紙、またはスマホ縦持ち)
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.style.display = 'none';
                pageLabel.textContent = currentPage;
            }
            
            console.log(`Now showing: ${imgLeft.src} ${imgRight.style.display !== 'none' ? '& ' + imgRight.src : ''}`);
        }

        function navigate(direction) {
            if (isAnimating) return;

            let nextNum = currentPage;
            const step = isSpread && currentPage > 1 ? 2 : 1;

            if (direction === 'next') {
                if (currentPage >= TOTAL_PAGES) return;
                nextNum = currentPage + (currentPage === 1 ? 1 : step);
                if (nextNum > TOTAL_PAGES) nextNum = TOTAL_PAGES;
                wrapper.classList.add('flip-next');
            } else {
                if (currentPage <= 1) return;
                nextNum = Math.max(1, currentPage - (currentPage <= 2 ? 1 : step));
                wrapper.classList.add('flip-prev');
            }

            isAnimating = true;
            
            setTimeout(() => {
                currentPage = nextNum;
                updateDisplay();
            }, 300);

            setTimeout(() => {
                wrapper.classList.remove('flip-next', 'flip-prev');
                isAnimating = false;
            }, 600);
        }

        document.getElementById('prev-zone').addEventListener('click', () => navigate('prev'));
        document.getElementById('next-zone').addEventListener('click', () => navigate('next'));

        window.addEventListener('resize', updateDisplay);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate('prev');
            if (e.key === 'ArrowRight') navigate('next');
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) navigate('next');
            if (touchEndX - touchStartX > 50) navigate('prev');
        }, {passive: true});

        // 初期実行
        updateDisplay();

    </script>
</body>
</html>
