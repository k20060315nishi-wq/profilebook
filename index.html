<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Profile Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            overflow: hidden;
        }

        #book-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            will-change: transform;
        }

        .page-container {
            position: relative;
            max-width: 95%;
            max-height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        .page-img {
            height: auto;
            max-height: 80vh;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #fff;
            user-select: none;
            -webkit-user-drag: none;
            transition: opacity 0.4s ease-in-out;
        }

        /* フェードアニメーション */
        .page-transition {
            animation: pageFade 0.5s ease-in-out;
        }
        @keyframes pageFade {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 操作エリア */
        .nav-button {
            position: fixed;
            bottom: 25px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .nav-button:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.4);
        }
        #prev-btn { left: 20px; }
        #next-btn { right: 20px; }

        /* タッチゾーン（画面の両端） */
        .touch-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 20%;
            z-index: 100;
        }
        #prev-zone { left: 0; }
        #next-zone { right: 0; }

        #page-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 8px 24px;
            border-radius: 999px;
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #zoom-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <!-- 透明なタッチゾーン（拡大してない時のみ反応） -->
        <div id="prev-zone" class="touch-zone"></div>
        <div id="next-zone" class="touch-zone"></div>
        
        <div id="book-wrapper">
            <div class="page-container" id="page-display-container">
                <img id="img-left" class="page-img" src="" alt="Page Left">
                <img id="img-right" class="page-img" src="" alt="Page Right">
            </div>
        </div>
    </div>

    <!-- 操作ボタン -->
    <button id="prev-btn" class="nav-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button id="next-btn" class="nav-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>

    <div id="page-overlay">
        <span id="page-label">1</span> / <span id="total-pages">--</span>
    </div>

    <div id="zoom-hint">ダブルタップで拡大 / ピンチ操作対応</div>

    <script>
        const TOTAL_PAGES = 18; 
        const IMAGE_PREFIX = 'page'; 
        const IMAGE_EXT = '.png';

        let currentPage = 1;
        let isSpread = false;
        let isAnimating = false;

        // ズーム・移動関連
        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let lastTouchDistance = 0;
        let ticking = false;

        const wrapper = document.getElementById('book-wrapper');
        const container = document.getElementById('page-display-container');
        const imgLeft = document.getElementById('img-left');
        const imgRight = document.getElementById('img-right');
        const pageLabel = document.getElementById('page-label');
        const totalLabel = document.getElementById('total-pages');

        totalLabel.textContent = TOTAL_PAGES;

        function updateDisplay(withAnimation = false) {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            isSpread = screenWidth > screenHeight;

            if (isSpread && currentPage > 1 && currentPage % 2 !== 0) {
                currentPage--;
            }

            if (withAnimation) {
                container.classList.remove('page-transition');
                void container.offsetWidth; // reflow
                container.classList.add('page-transition');
            }

            if (isSpread && currentPage < TOTAL_PAGES && currentPage !== 1) {
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.src = `${IMAGE_PREFIX}${currentPage + 1}${IMAGE_EXT}`;
                imgRight.style.display = 'block';
                pageLabel.textContent = `${currentPage}-${currentPage + 1}`;
            } else {
                imgLeft.src = `${IMAGE_PREFIX}${currentPage}${IMAGE_EXT}`;
                imgRight.style.display = 'none';
                pageLabel.textContent = currentPage;
            }
            resetZoom();
        }

        function resetZoom() {
            scale = 1;
            pointX = 0;
            pointY = 0;
            wrapper.style.transition = 'transform 0.3s ease-out';
            requestUpdate();
        }

        function requestUpdate() {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    wrapper.style.transform = `translate3d(${pointX}px, ${pointY}px, 0) scale(${scale})`;
                    const zones = document.querySelectorAll('.touch-zone');
                    const isZoomed = scale > 1.1;
                    zones.forEach(z => z.style.display = isZoomed ? 'none' : 'block');
                    document.getElementById('prev-btn').style.opacity = isZoomed ? '0' : '1';
                    document.getElementById('next-btn').style.opacity = isZoomed ? '0' : '1';
                    ticking = false;
                });
                ticking = true;
            }
        }

        function navigate(direction) {
            if (isAnimating || scale > 1.1) return;

            let nextNum = currentPage;
            const step = isSpread && currentPage > 1 ? 2 : 1;

            if (direction === 'next') {
                if (currentPage >= TOTAL_PAGES) return;
                nextNum = currentPage + (currentPage === 1 ? 1 : step);
            } else {
                if (currentPage <= 1) return;
                nextNum = Math.max(1, currentPage - (currentPage <= 2 ? 1 : step));
            }

            if (nextNum !== currentPage) {
                currentPage = nextNum;
                updateDisplay(true);
            }
        }

        // マウスドラッグ
        document.getElementById('viewer-container').addEventListener('mousedown', (e) => {
            if (scale > 1) {
                isDragging = true;
                startX = e.clientX - pointX;
                startY = e.clientY - pointY;
                wrapper.style.transition = 'none';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            requestUpdate();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // タッチ操作
        document.getElementById('viewer-container').addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                lastTouchDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                wrapper.style.transition = 'none';
            } else if (e.touches.length === 1 && scale > 1) {
                isDragging = true;
                startX = e.touches[0].clientX - pointX;
                startY = e.touches[0].clientY - pointY;
                wrapper.style.transition = 'none';
            }
        }, {passive: false});

        document.getElementById('viewer-container').addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const delta = dist / lastTouchDistance;
                scale = Math.min(Math.max(1, scale * delta), 4);
                lastTouchDistance = dist;
                requestUpdate();
            } else if (e.touches.length === 1 && isDragging) {
                pointX = e.touches[0].clientX - startX;
                pointY = e.touches[0].clientY - startY;
                requestUpdate();
            }
        }, {passive: false});

        document.getElementById('viewer-container').addEventListener('touchend', () => {
            isDragging = false;
        });

        // ダブルタップ
        let lastTap = 0;
        document.getElementById('viewer-container').addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                wrapper.style.transition = 'transform 0.4s cubic-bezier(0.2, 0, 0.2, 1)';
                if (scale > 1.1) {
                    resetZoom();
                } else {
                    scale = 2.5;
                    pointX = (window.innerWidth / 2 - e.clientX) * 1.5;
                    pointY = (window.innerHeight / 2 - e.clientY) * 1.5;
                    requestUpdate();
                }
                e.preventDefault();
            }
            lastTap = now;
        });

        // ボタン・ゾーンクリック
        document.getElementById('prev-btn').addEventListener('click', () => navigate('prev'));
        document.getElementById('next-btn').addEventListener('click', () => navigate('next'));
        document.getElementById('prev-zone').addEventListener('click', () => navigate('prev'));
        document.getElementById('next-zone').addEventListener('click', () => navigate('next'));

        window.addEventListener('resize', updateDisplay);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate('prev');
            if (e.key === 'ArrowRight') navigate('next');
            if (e.key === 'Escape') resetZoom();
        });

        updateDisplay();
    </script>
</body>
</html>
