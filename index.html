<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Profile Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            perspective: 1200px;
        }

        /* アニメーション用のラッパー */
        #canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s ease;
        }

        /* めくるようなアニメーションのクラス */
        .page-flip-next {
            animation: flipNext 0.6s ease-in-out;
        }

        .page-flip-prev {
            animation: flipPrev 0.6s ease-in-out;
        }

        @keyframes flipNext {
            0% { transform: translateX(0) rotateY(0); opacity: 1; }
            45% { transform: translateX(-50%) rotateY(-20deg); opacity: 0.5; }
            55% { transform: translateX(50%) rotateY(20deg); opacity: 0.5; }
            100% { transform: translateX(0) rotateY(0); opacity: 1; }
        }

        @keyframes flipPrev {
            0% { transform: translateX(0) rotateY(0); opacity: 1; }
            45% { transform: translateX(50%) rotateY(20deg); opacity: 0.5; }
            55% { transform: translateX(-50%) rotateY(-20deg); opacity: 0.5; }
            100% { transform: translateX(0) rotateY(0); opacity: 1; }
        }

        #pdf-canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .touch-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30%;
            z-index: 100;
        }
        #prev-zone { left: 0; }
        #next-zone { right: 0; }

        #page-overlay {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 8px 24px;
            border-radius: 999px;
            font-family: 'serif';
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: none;
            transition: opacity 1s ease;
            opacity: 0;
            backdrop-filter: blur(8px);
        }

        #page-overlay.show {
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #fdfbf7;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error-ui {
            display: none;
            color: #ef4444;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <div id="prev-zone" class="touch-zone"></div>
        <div id="next-zone" class="touch-zone"></div>
        <div id="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <div id="page-overlay">
        <span id="page-display">0</span> / <span id="total-pages">0</span>
    </div>

    <div id="loading" class="loading-overlay">
        <div id="loading-content">
            <div class="spinner mb-4 mx-auto"></div>
            <div class="text-stone-500 font-serif italic text-lg">Loading your story...</div>
        </div>
        <div id="error-ui">
            <p class="font-bold mb-2">PDFを読み込めませんでした</p>
            <p class="text-xs text-stone-500">book.pdfがGitHubの正しい場所に保存されているか確認してください。</p>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const PDF_PATH = './book.pdf';

        let pdfDoc = null;
        let pageNum = 1;
        let isSpread = false;
        let pageRendering = false;
        let pageNumPending = null;
        let overlayTimeout = null;

        const canvas = document.getElementById('pdf-canvas');
        const wrapper = document.getElementById('canvas-wrapper');
        const ctx = canvas.getContext('2d');
        const pageOverlay = document.getElementById('page-overlay');

        function showPageOverlay() {
            pageOverlay.classList.add('show');
            if (overlayTimeout) clearTimeout(overlayTimeout);
            overlayTimeout = setTimeout(() => {
                pageOverlay.classList.remove('show');
            }, 2500);
        }

        async function renderPage(num, direction = null) {
            if (!pdfDoc) return;
            pageRendering = true;
            
            // アニメーションの開始
            if (direction === 'next') {
                wrapper.classList.remove('page-flip-next', 'page-flip-prev');
                void wrapper.offsetWidth; // リフロー強制
                wrapper.classList.add('page-flip-next');
            } else if (direction === 'prev') {
                wrapper.classList.remove('page-flip-next', 'page-flip-prev');
                void wrapper.offsetWidth;
                wrapper.classList.add('page-flip-prev');
            }

            try {
                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;
                isSpread = screenWidth > screenHeight;

                if (isSpread && num > 1 && num % 2 !== 0) {
                    num--;
                }
                pageNum = num;

                const page1 = await pdfDoc.getPage(num);
                let viewport1 = page1.getViewport({ scale: 1 });
                
                let scale;

                // アニメーションのタイミングに合わせるための遅延（少しだけ描画を遅らせてスムーズに見せる）
                if (direction) await new Promise(r => setTimeout(r, 300));

                if (isSpread && num < pdfDoc.numPages) {
                    const page2 = await pdfDoc.getPage(num + 1);
                    const viewport2 = page2.getViewport({ scale: 1 });

                    const totalWidth = viewport1.width + viewport2.width;
                    const maxHeight = Math.max(viewport1.height, viewport2.height);

                    scale = Math.min(screenWidth / totalWidth, screenHeight / maxHeight) * (window.devicePixelRatio || 1);
                    
                    canvas.width = totalWidth * scale;
                    canvas.height = maxHeight * scale;

                    await page1.render({
                        canvasContext: ctx,
                        viewport: page1.getViewport({ scale: scale })
                    }).promise;

                    ctx.save();
                    ctx.translate(viewport1.width * scale, 0);
                    await page2.render({
                        canvasContext: ctx,
                        viewport: page2.getViewport({ scale: scale })
                    }).promise;
                    ctx.restore();

                    document.getElementById('page-display').textContent = `${num}-${num + 1}`;
                } else {
                    scale = Math.min(screenWidth / viewport1.width, screenHeight / viewport1.height) * (window.devicePixelRatio || 1);
                    const viewport = page1.getViewport({ scale });

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page1.render({
                        canvasContext: ctx,
                        viewport: viewport
                    }).promise;

                    document.getElementById('page-display').textContent = num;
                }
            } catch (err) {
                console.error('Render error:', err);
            }
            
            pageRendering = false;
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }

            showPageOverlay();
        }

        function queueRenderPage(num, direction = null) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num, direction);
            }
        }

        function onPrevPage() {
            if (!pdfDoc || pageNum <= 1 || pageRendering) return;
            const step = isSpread && pageNum > 1 ? 2 : 1;
            const nextNum = Math.max(1, pageNum - step);
            queueRenderPage(nextNum, 'prev');
        }

        function onNextPage() {
            if (!pdfDoc || pageNum >= pdfDoc.numPages || pageRendering) return;
            const step = isSpread ? 2 : 1;
            if (pageNum + step > pdfDoc.numPages && isSpread) return;
            queueRenderPage(pageNum + step, 'next');
        }

        window.addEventListener('load', async () => {
            try {
                const loadingTask = pdfjsLib.getDocument({
                    url: PDF_PATH,
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
                    cMapPacked: true,
                });

                pdfDoc = await loadingTask.promise;
                document.getElementById('total-pages').textContent = pdfDoc.numPages;
                
                await renderPage(pageNum);
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error('PDF読み込み失敗:', err);
                document.getElementById('loading-content').style.display = 'none';
                document.getElementById('error-ui').style.display = 'block';
            }
        });

        document.getElementById('prev-zone').addEventListener('click', onPrevPage);
        document.getElementById('next-zone').addEventListener('click', onNextPage);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') onPrevPage();
            if (e.key === 'ArrowRight') onNextPage();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) onNextPage();
            if (touchEndX - touchStartX > 50) onPrevPage();
        }, {passive: true});

        window.addEventListener('resize', () => {
            if (pdfDoc) renderPage(pageNum);
        });

        // アニメーション終了時にクラスを削除
        wrapper.addEventListener('animationend', () => {
            wrapper.classList.remove('page-flip-next', 'page-flip-prev');
        });

    </script>
</body>
</html>
